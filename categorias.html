<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - Cozinha Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex min-h-screen">

    <!-- Menu Lateral (ml-64 no main garante o espaço) -->
    <main class="ml-64 p-8 w-full">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">Organização de Categorias</h1>

        <!-- Formulário Categoria Principal -->
        <div class="bg-white p-6 rounded shadow-md mb-8 border-t-4 border-orange-500">
            <h2 class="font-bold text-gray-700 mb-4 uppercase text-xs tracking-wider">Criar Novo Grupo Principal</h2>
            <form id="formPrincipal" class="flex gap-4">
                <input type="text" id="nomePai" placeholder="Ex: Proteínas, Bebidas..." required 
                       class="flex-1 border border-gray-300 p-2 rounded focus:border-orange-500 outline-none">
                <button type="submit" class="bg-orange-500 text-white px-8 py-2 rounded font-bold hover:bg-orange-600 transition">
                    ADICIONAR
                </button>
            </form>
        </div>

        <!-- Tabela -->
        <div class="bg-white rounded shadow-md overflow-hidden border border-gray-100">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-4 border-r border-gray-700 w-1/3">CATEGORIA PRINCIPAL</th>
                        <th class="p-4">SUBCATEGORIAS (Digite e tecle Enter)</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="2" class="p-8 text-center text-gray-400">Carregando categorias...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        // Importações
        import { supabase } from './js/supabaseClient.js';
        import { renderMenu } from './js/menu.js';
        import { verificarSessao } from './js/auth.js';

        // Inicialização
        async function iniciar() {
            console.log("Iniciando script...");
            
            // 1. Renderiza o menu IMEDIATAMENTE
            try {
                renderMenu();
            } catch (e) {
                console.error("Erro ao carregar menu:", e);
            }

            // 2. Verifica sessão
            const sessao = await verificarSessao();
            if (!sessao) return;

            // 3. Carrega os dados da tabela
            await carregarDados();

            // 4. Configura o formulário principal
            document.getElementById('formPrincipal').addEventListener('submit', cadastrarPrincipal);
        }

        async function carregarDados() {
            const { data: categorias, error } = await supabase.from('categorias').select('*').order('nome');
            if (error) return console.error(error);

            const corpo = document.getElementById('corpoTabela');
            const principais = categorias.filter(c => !c.categoria_pai);
            corpo.innerHTML = '';

            principais.forEach(pai => {
                const subs = categorias.filter(c => c.categoria_pai === pai.id);
                
                // Linha da tabela
                const tr = document.createElement('tr');
                tr.className = "border-b bg-white hover:bg-gray-50";
                
                // Coluna Principal
                const tdPai = document.createElement('td');
                tdPai.className = "p-4 border-r font-bold flex justify-between items-center";
                tdPai.innerHTML = `<span>${pai.nome}</span>`;
                
                const btnDelPai = document.createElement('button');
                btnDelPai.innerHTML = "🗑️";
                btnDelPai.className = "text-gray-300 hover:text-red-500 transition px-2";
                btnDelPai.onclick = () => excluirCategoria(pai.id, pai.nome);
                tdPai.appendChild(btnDelPai);

                // Coluna Subcategorias
                const tdSubs = document.createElement('td');
                tdSubs.className = "p-4";
                
                const divCont = document.createElement('div');
                divCont.className = "flex flex-wrap items-center gap-2";

                subs.forEach(s => {
                    const span = document.createElement('span');
                    span.className = "bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm font-medium flex items-center gap-2";
                    span.innerHTML = `${s.nome}`;
                    
                    const btnDelSub = document.createElement('button');
                    btnDelSub.innerText = "✕";
                    btnDelSub.className = "hover:text-red-600 font-bold";
                    btnDelSub.onclick = () => excluirCategoria(s.id, s.nome);
                    
                    span.appendChild(btnDelSub);
                    divCont.appendChild(span);
                });

                // Input para nova subcategoria
                const inputSub = document.createElement('input');
                inputSub.placeholder = "+ Sub-item...";
                inputSub.className = "border-b border-gray-300 focus:border-orange-500 outline-none p-1 text-sm bg-transparent w-32";
                inputSub.onkeydown = async (e) => {
                    if (e.key === 'Enter') {
                        await cadastrarSub(pai.id, e.target.value);
                        e.target.value = '';
                    }
                };

                divCont.appendChild(inputSub);
                tdSubs.appendChild(divCont);
                
                tr.appendChild(tdPai);
                tr.appendChild(tdSubs);
                corpo.appendChild(tr);
            });
        }

        async function cadastrarPrincipal(e) {
            e.preventDefault();
            const nome = document.getElementById('nomePai').value;
            const { error } = await supabase.from('categorias').insert([{ nome }]);
            if (error) alert("Erro ao salvar");
            else {
                document.getElementById('nomePai').value = '';
                carregarDados();
            }
        }

        async function cadastrarSub(paiId, nome) {
            if (!nome.trim()) return;
            const { error } = await supabase.from('categorias').insert([{ nome, categoria_pai: paiId }]);
            if (error) alert("Erro ao salvar subcategoria");
            else carregarDados();
        }

        async function excluirCategoria(id, nome) {
            if (confirm(`Excluir "${nome}"?`)) {
                const { error } = await supabase.from('categorias').delete().eq('id', id);
                if (error) alert("Erro: Esta categoria pode estar em uso em produtos.");
                else carregarDados();
            }
        }

        // Inicia a página
        iniciar();
    </script>
</body>
</html>
