<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Categorias - Cozinha Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex">

    <!-- O menu será injetado aqui pelo renderMenu() -->

    <main class="ml-64 p-8 w-full">
        <h1 class="text-3xl font-bold mb-6">Organização de Categorias</h1>

        <!-- Formulário para Categoria Principal -->
        <div class="bg-white p-6 rounded shadow-sm mb-8 border-l-4 border-orange-500">
            <h2 class="font-bold text-gray-700 mb-4">1. Nova Categoria Principal</h2>
            <form id="formPai" class="flex gap-4">
                <input type="text" id="nomePai" placeholder="Ex: Proteínas, Bebidas, FLV..." required 
                       class="flex-1 border p-2 rounded text-lg focus:ring-2 focus:ring-orange-500 outline-none">
                <button type="submit" class="bg-orange-500 text-white px-6 py-2 rounded font-bold hover:bg-orange-600 transition">
                    + Criar Principal
                </button>
            </form>
        </div>

        <!-- Tabela de Gestão -->
        <div class="bg-white rounded shadow-sm overflow-hidden border">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-4 w-1/3 border-r border-gray-700">CATEGORIA PRINCIPAL</th>
                        <th class="p-4">SUBCATEGORIAS (Digite e aperte Enter)</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="2" class="p-4 text-center text-gray-500">Carregando categorias...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { supabase } from './js/supabaseClient.js';
        import { renderMenu } from './js/menu.js';
        import { verificarSessao } from './js/auth.js';

        async function init() {
            const sessao = await verificarSessao();
            if (sessao) {
                renderMenu();
                renderizarTabela();
            }
        }

        async function renderizarTabela() {
            // Busca todas as categorias
            const { data: todas, error } = await supabase.from('categorias').select('*').order('nome');
            if (error) {
                console.error("Erro ao buscar:", error);
                return;
            }

            const principais = todas.filter(c => !c.categoria_pai);
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';

            if (principais.length === 0) {
                corpo.innerHTML = '<tr><td colspan="2" class="p-10 text-center text-gray-400">Nenhuma categoria cadastrada.</td></tr>';
            }

            principais.forEach(pai => {
                const subs = todas.filter(c => c.categoria_pai === pai.id);
                
                const htmlSubs = subs.map(s => `
                    <span class="inline-flex items-center bg-orange-50 text-orange-700 border border-orange-200 px-3 py-1 rounded-full text-sm font-medium mr-2 mb-2 group">
                        ${s.nome}
                        <button onclick="window.excluirCategoria('${s.id}', '${s.nome}')" class="ml-2 text-orange-300 hover:text-red-500">✕</button>
                    </span>
                `).join('');

                corpo.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 border-r bg-gray-50/30">
                            <div class="flex justify-between items-center group">
                                <span class="font-bold text-xl text-gray-800">${pai.nome}</span>
                                <button onclick="window.excluirCategoria('${pai.id}', '${pai.nome}')" 
                                        class="text-gray-300 hover:text-red-600 transition-colors p-1" title="Excluir Principal">
                                    🗑️
                                </button>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="flex flex-wrap items-center">
                                ${htmlSubs}
                                <input type="text" 
                                    placeholder="+ Novo sub-item..." 
                                    class="border-b border-dashed border-gray-300 focus:border-orange-500 outline-none p-1 text-sm bg-transparent w-40 ml-2"
                                    onkeydown="if(event.key === 'Enter') window.adicionarSub('${pai.id}', this.value)"
                                >
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // --- FUNÇÕES GLOBAIS (necessárias para o HTML enxergar dentro do module) ---

        window.adicionarSub = async (paiId, nomeSub) => {
            if (!nomeSub.trim()) return;
            const { error } = await supabase.from('categorias').insert([{ 
                nome: nomeSub, 
                categoria_pai: paiId 
            }]);
            
            if (error) alert("Erro ao adicionar subcategoria.");
            renderizarTabela();
        };

            if (confirm(`Deseja realmente excluir "${nome}"?\n\nAtenção: Isso pode afetar produtos vinculados.`)) {
