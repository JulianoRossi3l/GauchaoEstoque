<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Categorias - Cozinha Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex min-h-screen">

    <main class="ml-64 p-8 w-full">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">Categorias</h1>

        <!-- Formulário Simples -->
        <div class="bg-white p-6 rounded shadow-md mb-8 border-t-4 border-orange-500 max-w-2xl">
            <h2 class="font-bold text-gray-700 mb-4 uppercase text-xs">Nova Categoria</h2>
            <form id="formCategoria" class="flex gap-4">
                <input type="text" id="nomeCat" placeholder="Ex: Proteínas, Bebidas, Insumos..." required 
                       class="flex-1 border border-gray-300 p-2 rounded focus:border-orange-500 outline-none">
                <button type="submit" class="bg-orange-500 text-white px-6 py-2 rounded font-bold hover:bg-orange-600 transition">
                    CADASTRAR
                </button>
            </form>
        </div>

        <!-- Tabela Simples -->
        <div class="bg-white rounded shadow-md overflow-hidden max-w-2xl border border-gray-100">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-gray-800 text-white">
                        <th class="p-4">NOME DA CATEGORIA</th>
                        <th class="p-4 text-center">AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <tr><td colspan="2" class="p-8 text-center text-gray-400">Carregando...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { supabase } from './js/supabaseClient.js';
        import { renderMenu } from './js/menu.js';
        import { verificarSessao } from './js/auth.js';

        async function init() {
            renderMenu();
            const sessao = await verificarSessao();
            if (sessao) carregarCategorias();

            document.getElementById('formCategoria').addEventListener('submit', salvarCategoria);
        }

        async function carregarCategorias() {
            const { data, error } = await supabase.from('categorias').select('*').order('nome');
            if (error) return;

            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';

            if (data.length === 0) {
                corpo.innerHTML = '<tr><td colspan="2" class="p-8 text-center text-gray-400">Nenhuma categoria encontrada.</td></tr>';
                return;
            }

            data.forEach(cat => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-4 font-medium text-gray-700">${cat.nome}</td>
                    <td class="p-4 text-center">
                        <button class="text-red-400 hover:text-red-600 font-bold px-3 py-1" onclick="window.excluirCategoria('${cat.id}', '${cat.nome}')">
                            Excluir
                        </button>
                    </td>
                `;
                corpo.appendChild(tr);
            });
        }

        async function salvarCategoria(e) {
            e.preventDefault();
            const nome = document.getElementById('nomeCat').value;
            const { error } = await supabase.from('categorias').insert([{ nome }]);
            if (error) alert("Erro ao salvar!");
            else {
                document.getElementById('nomeCat').value = '';
                carregarCategorias();
            }
        }

        window.excluirCategoria = async (id, nome) => {
            if (confirm(`Excluir a categoria "${nome}"?`)) {
                const { error } = await supabase.from('categorias').delete().eq('id', id);
                if (error) alert("Erro: Não é possível excluir categorias que possuem produtos vinculados.");
                else carregarCategorias();
            }
        }

        init();
    </script>
</body>
</html>
