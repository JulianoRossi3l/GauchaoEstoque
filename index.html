<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão de Estoque</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold mb-6 text-center text-orange-600">Cozinha Control</h1>
<form id="loginForm" class="space-y-4">
    <div>
        <label class="block text-sm font-medium">E-mail</label>
        <input type="email" id="email" name="email" required class="w-full border p-2 rounded">
    </div>
    <div>
        <label class="block text-sm font-medium">Senha</label>
        <input type="password" id="password" name="password" required class="w-full border p-2 rounded">
    </div>
    <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded hover:bg-orange-600">Entrar</button>
</form>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
