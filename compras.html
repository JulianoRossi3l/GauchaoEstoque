<script type="module">
    import { supabase } from './js/supabaseClient.js';
    import { renderMenu } from './js/menu.js';

    async function gerarLista() {
        renderMenu();
        const { data: produtos } = await supabase
            .from('produtos')
            .select('*, fornecedores(nome, telefone)');

        const listaFiltrada = produtos.filter(p => p.quantidade_atual <= p.quantidade_minima);
        const container = document.getElementById('listaSugestao');

        let textoWhats = "*LISTA DE COMPRAS - COZINHA*\n\n";

        listaFiltrada.forEach(p => {
            const sugestaoQtd = (p.quantidade_minima * 2) - p.quantidade_atual;
            container.innerHTML += `
                <div class="bg-white p-4 shadow mb-2 rounded border-l-4 border-orange-500">
                    <h3 class="font-bold">${p.nome}</h3>
                    <p>Sugerido: <b>${sugestaoQtd} ${p.unidade}</b></p>
                    <p class="text-sm text-gray-600">Fornecedor: ${p.fornecedores?.nome}</p>
                </div>
            `;
            textoWhats += `- ${p.nome}: ${sugestaoQtd} ${p.unidade} (${p.fornecedores?.nome})\n`;
        });

        document.getElementById('btnWhats').onclick = () => {
            window.open(`https://wa.me/?text=${encodeURIComponent(textoWhats)}`);
        };
    }
    gerarLista();
</script>
